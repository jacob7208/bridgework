<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BridgeWork</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <h1>BridgeWork</h1>
            </div>
            <div class="header-right">
                <button id="log-in-btn" class="btn">Log In</button>
            </div>
        </div>
    </header>

    <main id="list-view">
        <div class="view-header">
            <button id="new-btn" class="btn hover-effect">New</button>
            <input type="text" id="search" placeholder="Search...">
        </div>
        <div class="notebook">
            <div id="songs-container" class="notebook-content"></div>
        </div>
    </main>

    <main id="edit-view" style="display: none;">
        <div class="view-header">
            <button id="back-btn" class="btn hover-effect">Back</button>
            <button id="delete-btn" class="btn hover-effect">Delete</button>
            <span id="save-status"></span>
        </div>
        <div class="notebook">
            <div id="song-container" class="notebook-content"></div>
        </div>
    </main>
    <script src="/static/js/main.js" type="module"></script>
</body>
</html>
