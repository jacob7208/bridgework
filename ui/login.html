<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BridgeWork</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<header>
    <div class="header-inner">
        <h1>BridgeWork</h1>
    </div>
</header>

<main>
    <div class="auth-container">
        <form id="login-form">
            <h2>Welcome back</h2>
            <label>
                Email
                <input type="email" email="email" />
            </label>
            <label>
                Password
                <input type="password" password="password"/>
            </label>
        </form>
        <p class="toggle-auth">
            Don't have an account? <a href="/signup">Sign up</a>
        </p>
    </div>
</main>
<script src="/static/js/auth.js" type="module"></script>
</body>
</html>
