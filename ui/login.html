<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BridgeWork</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<header>
    <div class="header-inner">
        <h1>BridgeWork</h1>
    </div>
</header>

<main>
    <div class="auth-container">
        <h2>Welcome back</h2>
        <div class="login-form">
            <form id="login-form" novalidate>
                <div id="form-msg" class="form-message"></div>
                <div class="form-group">
                    <div id="email-err" class="error-message"></div>
                    <input id="email" class="form-input" type="email" name="email" placeholder="Email" />
                </div>
                <div class="form-group">
                    <div id="password-err" class="error-message"></div>
                    <input id="password" class="form-input" type="password" name="password" placeholder="Password"/>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">Log in</button>
            </form>
            <p class="toggle-auth">
                Don't have an account? <a href="/signup">Sign up</a>
            </p>
        </div>
    </div>
</main>
<script src="/static/js/auth/login.js" type="module"></script>
</body>
</html>
